front:
  text: 大唐新翻密嚴經序朕聞西方有聖人焉演不言之言垂無教之教啟迪權實發披聾瞽遷其善者不疾而速階其益者即聖自凡擊蒙求以娑婆丘陵示達觀以密嚴世界匪染淨在我實是非遊而楚越生於念中及缺頓於目下彼魚藏鳥逝其若是乎欽哉密嚴迹超三有量周乎法界相離於極微非聲聞之所聞豈色見之能見甞潔已主妙允恭付屬是欲泉靜識浪珠清意源窮賴耶能變之端照自覺湛然之境深詣心極其唯是經夫翻譯之來抑有由矣雖方言有異而本質須存此經梵書並是偈頌先之譯者多作散文蛇化為龍何必變於鱗介家成於國寧即改乎姓氏矧訛略輕重或有異同再而詳悉可為盡善大興善寺三藏沙門不空像教棟梁愛河舟楫戒珠在握明鏡入懷雪涉雲征窮鹿野之真諦帆飛海宿究馬鳴之奧音聲該八轉言善兩方之可窺鑑闕如抑揚了義詔令集京城義學沙門飛錫等翰林學士柳抗等詳譯斯文及護國經等對執貝多翻諸簡牘憑其本夾依以頌言大羹之味不遺清月之魄恒滿豈不美歟豈不美歟朕詞乏清華文非道麗志流衍於祕賾將布灌於無窮聊課虛懷序之篇首云爾
